spring:
  application:
    name: agentpay-core
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/core_db}
    username: ${DB_USERNAME:agentpay}
    password: ${DB_PASSWORD:agentpay}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health
agentpay:
  chain-id: 31337
  base-url: ${AGENTPAY_BASE_URL:http://localhost:8080}
