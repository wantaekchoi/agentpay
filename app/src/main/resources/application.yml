spring:
  application:
    name: agentpay-core
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/core_db}
    username: ${DB_USERNAME:agentpay}
    password: ${DB_PASSWORD:agentpay}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health
agentpay:
  chain-id: 31337
  base-url: ${AGENTPAY_BASE_URL:http://localhost:8080}
  guardrail:
    allowed-tools: [web_search, send_notification]
    blocked-tool-patterns: [shell]
    allowed-domain-patterns: [example.com]
    high-risk-actions: [wire_transfer]
    approval-required-actions: [send_notification]
    approval-gate-enabled: true
    domain-check-enabled: false
